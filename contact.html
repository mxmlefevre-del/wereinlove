<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - WereInLove</title>
  <style>
    :root { --bg:#f6f2ef; --ink:#181818; --muted:#77716b; --black:#171412; --line:rgba(24,24,24,.12); --rose:#ff5d8f; --font:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased}
    .nav{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:4px;padding:5px;border:1px solid var(--line);border-radius:999px;background:rgba(246,242,239,.82);backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(36,28,22,.12)}
    .brand,.cta{height:46px;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:0 22px;font-weight:620;text-decoration:none;color:var(--ink);white-space:nowrap}.brand:before{content:"";width:17px;height:17px;margin-right:8px;border-radius:999px;background:linear-gradient(90deg,var(--rose) 0 48%,#ffb3c8 48%)}.cta{background:var(--black);color:#fff}
    main{min-height:100svh;display:grid;place-items:center;padding:130px 24px 70px}.panel{width:min(920px,100%);border-radius:34px;background:#fff;padding:clamp(34px,7vw,82px);box-shadow:0 34px 90px rgba(36,28,22,.10)}
    p.kicker{margin:0 0 28px;color:#9d9690;text-transform:uppercase;letter-spacing:.24em;font-size:13px;font-weight:650}h1{margin:0;font-size:clamp(44px,8vw,96px);line-height:.95;letter-spacing:-.07em;font-weight:650}p{max-width:720px;margin:28px 0 0;color:var(--muted);font-size:clamp(19px,2.6vw,28px);line-height:1.45;letter-spacing:-.035em}.button{display:inline-flex;margin-top:38px;min-height:58px;align-items:center;justify-content:center;border-radius:999px;background:var(--black);color:#fff;text-decoration:none;padding:0 28px;font-weight:650}
  </style>
</head>
<body>
  <nav class="nav"><a class="brand" href="index.html">WereInLove</a><a class="cta" href="index.html">Accueil</a></nav>
  <main>
    <section class="panel">
      <p class="kicker">Contact</p>
      <h1>Nous écrire.</h1>
      <p>La page contact arrive bientôt. En attendant, vous pouvez revenir à l'accueil et commencer une histoire depuis l'espace WereInLove.</p>
      <a class="button" href="app.html">Commencer gratuitement</a>
    </section>
  </main>
</body>
</html>
