<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Boite a histoires - WereInLove</title>
  
<link rel="icon" type="image/png" href="wereinlove-assets/favicon.png">
<link rel="icon" href="wereinlove-assets/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="wereinlove-assets/apple-touch-icon.png">
<meta name="description" content="Des histoires anonymisees et apaisees avec WereInLove.">
  <script src="disputes-data.js"></script>
  <style>
    :root {
      --cream: #f5f1ee;
      --cream-2: #ebe5df;
      --ink: #171513;
      --muted: #7f7872;
      --line: rgba(23, 21, 19, .14);
      --pink: #ff5b95;
      --green: #719b85;
      --shadow: 0 28px 90px rgba(23, 21, 19, .12);
      --radius: 34px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--cream); color: var(--ink); }
    body { overflow: hidden; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; }

    .story-nav {
      position: fixed;
      z-index: 50;
      top: calc(18px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      gap: 18px;
      min-height: 54px;
      padding: 6px 8px 6px 18px;
      border: 1px solid rgba(23, 21, 19, .13);
      border-radius: 999px;
      background: rgba(245, 241, 238, .78);
      backdrop-filter: blur(26px);
      box-shadow: 0 16px 52px rgba(23, 21, 19, .14);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .brand-mark {
      width: 24px;
      height: 14px;
      position: relative;
      display: inline-block;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      top: 0;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: var(--pink);
    }

    .brand-mark::after {
      left: 9px;
      background: rgba(255, 91, 149, .46);
    }

    .nav-home {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-weight: 800;
    }

    .return-button {
      position: fixed;
      z-index: 55;
      right: max(18px, env(safe-area-inset-right));
      bottom: calc(18px + env(safe-area-inset-bottom));
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 999px;
      background: rgba(23, 21, 19, .78);
      color: #fff;
      padding: 14px 18px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .22);
      backdrop-filter: blur(18px);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
      transform: translateY(8px);
    }

    .return-button.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .feed {
      height: 100svh;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 91, 149, .07), transparent 24rem),
        linear-gradient(180deg, #fbf8f5 0%, var(--cream) 100%);
    }

    .panel {
      min-height: 100svh;
      scroll-snap-align: start;
      position: relative;
      overflow: hidden;
    }

    .menu-panel {
      display: grid;
      place-items: center;
      padding: calc(112px + env(safe-area-inset-top)) 24px calc(42px + env(safe-area-inset-bottom));
      color: #fff;
      background-image:
        linear-gradient(180deg, rgba(23, 21, 19, .48), rgba(23, 21, 19, .78)),
        url("wereinlove-assets/boite-histoire-cover.jpg");
      background-position: center;
      background-size: cover;
    }

    .menu-content {
      width: min(1120px, 100%);
      min-height: calc(100svh - 170px);
      display: grid;
      grid-template-columns: minmax(0, .9fr) minmax(360px, 1.1fr);
      align-items: center;
      gap: clamp(34px, 7vw, 96px);
    }

    .eyebrow {
      margin: 0 0 22px;
      color: rgba(255, 255, 255, .7);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .36em;
    }

    h1 {
      margin: 0;
      max-width: 720px;
      font-size: clamp(58px, 8vw, 116px);
      line-height: .9;
      letter-spacing: -.065em;
    }

    .menu-copy {
      margin: 28px 0 0;
      max-width: 590px;
      color: rgba(255, 255, 255, .74);
      font-size: clamp(19px, 2vw, 28px);
      line-height: 1.45;
      letter-spacing: -.03em;
    }

    .gesture-hint {
      margin-top: 28px;
      color: rgba(255, 255, 255, .58);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .24em;
      text-transform: uppercase;
    }

    .bubble-stage {
      height: min(70svh, 680px);
      min-height: 430px;
      perspective: 1400px;
      display: grid;
      place-items: center;
      touch-action: none;
      cursor: grab;
    }

    .bubble-stage:active { cursor: grabbing; }

    .bubble-sphere {
      width: min(590px, 88vw);
      height: min(590px, 88vw);
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(var(--rx, -9deg)) rotateY(var(--ry, -16deg));
      transition: transform .18s ease-out;
    }

    .story-bubble {
      position: absolute;
      left: 50%;
      top: 50%;
      max-width: 260px;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 999px;
      background: rgba(245, 241, 238, .16);
      color: #fff;
      padding: 14px 18px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, .22);
      backdrop-filter: blur(22px);
      transform:
        translate(-50%, -50%)
        rotateY(var(--angle))
        translateZ(var(--depth))
        rotateY(calc(var(--angle) * -1));
      cursor: pointer;
      text-align: left;
    }

    .story-bubble strong {
      display: block;
      font-size: 15px;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .story-bubble span {
      display: block;
      margin-top: 5px;
      color: rgba(255, 255, 255, .62);
      font-size: 12px;
    }

    .story-panel {
      background: var(--cream);
    }

    .story-carousel {
      height: 100svh;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 100%;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
    }

    .story-carousel::-webkit-scrollbar { display: none; }

    .slide {
      scroll-snap-align: start;
      min-height: 100svh;
      padding: calc(108px + env(safe-area-inset-top)) clamp(24px, 5vw, 72px) calc(38px + env(safe-area-inset-bottom));
      display: grid;
      place-items: center;
    }

    .story-cover {
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 91, 149, .07), transparent 36rem),
        var(--cream);
    }

    .cover-card,
    .demo-card,
    .verdict-card {
      width: min(940px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .86);
      box-shadow: var(--shadow);
    }

    .cover-card {
      min-height: min(620px, 70svh);
      padding: clamp(30px, 6vw, 72px);
      display: grid;
      align-content: center;
    }

    .cover-kicker,
    .verdict-kicker {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
      letter-spacing: .34em;
      text-transform: uppercase;
    }

    .cover-card h2 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(48px, 7vw, 92px);
      line-height: .92;
      letter-spacing: -.065em;
    }

    .cover-card p {
      max-width: 640px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: clamp(19px, 2vw, 27px);
      line-height: 1.36;
      letter-spacing: -.025em;
    }

    .swipe-note {
      margin-top: 42px;
      color: rgba(23, 21, 19, .44);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .demo-card {
      overflow: hidden;
    }

    .interface-line {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 28px;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      font-size: 17px;
      letter-spacing: -.02em;
    }

    .status-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--green);
      flex: 0 0 auto;
    }

    .bubble-stack {
      padding: clamp(24px, 4vw, 44px);
      display: grid;
      gap: 22px;
    }

    .quote-bubble {
      border-radius: 26px;
      background: var(--cream-2);
      padding: clamp(22px, 4vw, 38px);
      color: #292522;
      font-size: clamp(22px, 2.5vw, 34px);
      line-height: 1.35;
      letter-spacing: -.04em;
    }

    .quote-bubble strong { font-weight: 850; }

    .verdict-card {
      padding: clamp(26px, 5vw, 54px);
      text-align: center;
    }

    .verdict-card h2 {
      margin: 0;
      font-size: clamp(42px, 6vw, 76px);
      line-height: .95;
      letter-spacing: -.06em;
    }

    .score-row {
      margin: 28px auto 20px;
      display: flex;
      justify-content: center;
      align-items: end;
      gap: clamp(22px, 5vw, 56px);
    }

    .score {
      min-width: 120px;
    }

    .score b {
      display: block;
      font-size: clamp(62px, 9vw, 118px);
      line-height: .8;
      letter-spacing: -.07em;
    }

    .score span {
      display: block;
      margin-top: 10px;
      font-size: 19px;
      font-weight: 850;
    }

    .versus {
      align-self: center;
      color: var(--muted);
      font-size: 26px;
      font-weight: 850;
    }

    .verdict-meter {
      height: 22px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--ink);
      display: flex;
      margin: 0 auto 34px;
      max-width: 720px;
    }

    .verdict-meter span:first-child { background: var(--green); }
    .verdict-meter span:last-child { background: var(--pink); }

    .verdict-intro {
      max-width: 760px;
      margin: 0 auto 34px;
      color: #756e68;
      font-size: clamp(21px, 2.3vw, 31px);
      line-height: 1.45;
      font-style: italic;
      letter-spacing: -.025em;
    }

    .verdict-section {
      max-width: 790px;
      margin: 0 auto;
      text-align: left;
    }

    .verdict-section h3 {
      margin: 34px 0 12px;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1;
      letter-spacing: -.055em;
    }

    .verdict-section p {
      margin: 0;
      color: #6e6762;
      font-size: clamp(20px, 2vw, 29px);
      line-height: 1.55;
      letter-spacing: -.03em;
    }

    .pacts {
      display: grid;
      gap: 18px;
      margin-top: 22px;
    }

    .pact {
      border: 1px solid var(--line);
      border-left: 6px solid var(--green);
      border-radius: 20px;
      background: var(--cream-2);
      padding: 22px;
    }

    .pact:nth-child(2) { border-left-color: var(--pink); }

    .pact b {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .story-cta {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin-top: 34px;
      min-height: 64px;
      padding: 0 34px;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-weight: 850;
      font-size: 18px;
    }

    .slide-dots {
      position: absolute;
      z-index: 8;
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      padding: 7px 9px;
      border-radius: 999px;
      background: rgba(245, 241, 238, .68);
      backdrop-filter: blur(14px);
    }

    .slide-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(23, 21, 19, .2);
    }

    .slide-dots span.is-active { background: var(--ink); }

    @media (max-width: 820px) {
      .story-nav {
        top: calc(16px + env(safe-area-inset-top));
        min-height: 50px;
        gap: 12px;
        padding-left: 14px;
        max-width: calc(100vw - 32px);
      }

      .nav-home {
        min-height: 38px;
        padding: 0 17px;
      }

      .menu-content {
        min-height: calc(100svh - 142px);
        grid-template-columns: 1fr;
        text-align: center;
        gap: 14px;
      }

      h1 {
        margin: 0 auto;
        font-size: clamp(50px, 14vw, 76px);
      }

      .menu-copy {
        margin-left: auto;
        margin-right: auto;
      }

      .bubble-stage {
        min-height: 350px;
        height: 42svh;
        order: -1;
      }

      .bubble-sphere {
        width: min(360px, 88vw);
        height: min(360px, 88vw);
      }

      .story-bubble {
        max-width: 210px;
        padding: 12px 15px;
      }

      .story-bubble span { display: none; }

      .slide {
        padding-left: 24px;
        padding-right: 24px;
      }

      .cover-card {
        min-height: auto;
        padding: 34px 26px;
      }

      .cover-card h2 {
        font-size: clamp(44px, 13vw, 62px);
      }

      .score-row {
        gap: 18px;
      }

      .score {
        min-width: 96px;
      }

      .verdict-card {
        max-height: calc(100svh - 138px);
        overflow-y: auto;
        text-align: center;
      }

      .verdict-section {
        text-align: left;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
      }
    }
  
/* WereInLove real logo rollout */
img.brand-logo,
.logo img.brand-logo,
.brand img.brand-logo {
  display: block !important;
  width: 30px !important;
  height: 26px !important;
  object-fit: contain !important;
  flex: 0 0 auto !important;
}
.logo::before,
.brand::before,
.mf-brand::before {
  display: none !important;
  content: none !important;
}
.logo-mark,
.brand-mark {
  display: none !important;
}
.logo svg,
.brand svg {
  display: none !important;
}
img.mf-logo {
  display: block !important;
  width: 86px !important;
  height: auto !important;
  object-fit: contain !important;
  filter: drop-shadow(0 8px 24px rgba(255,45,117,.38));
}
@media (max-width: 760px) {
  img.brand-logo,
  .logo img.brand-logo,
  .brand img.brand-logo {
    width: 26px !important;
    height: 23px !important;
  }
}

</style>
</head>
<body>
  <nav class="story-nav" aria-label="Navigation principale">
    <a class="brand" href="index.html"><img class="brand-logo" src="wereinlove-assets/wereinlove-logo.png" alt="" aria-hidden="true"><span>WEREINLOVE™</span></a>
    <a class="nav-home" href="index.html">Accueil</a>
  </nav>

  <button class="return-button" type="button">Toutes les histoires</button>

  <main class="feed" id="feed">
    <section class="panel menu-panel" id="menu">
      <div class="menu-content">
        <div>
          <p class="eyebrow">BOITE A HISTOIRES</p>
          <h1>Bienvenue dans la boite a histoires</h1>
          <p class="menu-copy">Des recits anonymises, publies uniquement avec l'accord des personnes concernees. Choisissez une histoire, puis swipez pour decouvrir ce que WereInLove™ a vu.</p>
          <p class="gesture-hint">Glissez la sphere · Touchez un titre</p>
        </div>
        <div class="bubble-stage" aria-label="Selection des histoires">
          <div class="bubble-sphere" id="bubbleSphere"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const stories = window.WIL_STORIES || [];
    const feed = document.getElementById("feed");
    const bubbleSphere = document.getElementById("bubbleSphere");
    const returnButton = document.querySelector(".return-button");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function storyTemplate(story, index) {
      const [left, right] = story.split;
      return `
        <section class="panel story-panel" id="${story.slug}" data-story-index="${index}">
          <div class="story-carousel" aria-label="${escapeHtml(story.title)}">
            <article class="slide story-cover">
              <div class="cover-card">
                <p class="cover-kicker">${escapeHtml(story.category)}</p>
                <h2>${escapeHtml(story.title)}</h2>
                <p>${escapeHtml(story.hook)}</p>
                <div class="swipe-note">Swipez vers la droite</div>
              </div>
            </article>
            <article class="slide">
              <div class="demo-card">
                <div class="interface-line"><span class="status-dot"></span><span>WereInLove™ — Lecture croisee</span></div>
                <div class="bubble-stack">
                  <div class="quote-bubble"><strong>${escapeHtml(story.names[0])}</strong> : “${escapeHtml(story.versions[0])}”</div>
                  <div class="quote-bubble"><strong>${escapeHtml(story.names[1])}</strong> : “${escapeHtml(story.versions[1])}”</div>
                </div>
              </div>
            </article>
            <article class="slide">
              <div class="verdict-card">
                <p class="verdict-kicker">Le verdict</p>
                <h2>${escapeHtml(story.title)}</h2>
                <div class="score-row">
                  <div class="score"><b>${left}%</b><span>${escapeHtml(story.names[0])}</span></div>
                  <div class="versus">vs</div>
                  <div class="score"><b>${right}%</b><span>${escapeHtml(story.names[1])}</span></div>
                </div>
                <div class="verdict-meter" aria-hidden="true">
                  <span style="width:${left}%"></span>
                  <span style="width:${right}%"></span>
                </div>
                <p class="verdict-intro">${escapeHtml(story.intro)}</p>
                <div class="verdict-section">
                  <h3>Ce que l'IA a vu</h3>
                  <p>${escapeHtml(story.analysis)}</p>
                  <h3>Et maintenant, on se reparle autrement</h3>
                  <div class="pacts">
                    ${story.pacts.map((pact) => `
                      <div class="pact">
                        <b>Le pacte de ${escapeHtml(pact.name)}</b>
                        <p>${escapeHtml(pact.text)}</p>
                      </div>
                    `).join("")}
                  </div>
                </div>
                <a class="story-cta" href="app.html">Apaiser un nouveau conflit</a>
              </div>
            </article>
          </div>
          <div class="slide-dots" aria-hidden="true"><span class="is-active"></span><span></span><span></span></div>
        </section>
      `;
    }

    stories.forEach((story, index) => {
      const button = document.createElement("button");
      button.className = "story-bubble";
      button.type = "button";
      button.style.setProperty("--angle", `${index * (360 / stories.length)}deg`);
      button.style.setProperty("--depth", `${Math.min(260, 170 + stories.length * 15)}px`);
      button.innerHTML = `<strong>${escapeHtml(story.title)}</strong><span>${escapeHtml(story.category)}</span>`;
      button.addEventListener("click", () => {
        document.getElementById(story.slug)?.scrollIntoView({ behavior: "smooth" });
      });
      bubbleSphere.appendChild(button);
      feed.insertAdjacentHTML("beforeend", storyTemplate(story, index));
    });

    let dragging = false;
    let startX = 0;
    let startY = 0;
    let rotX = -9;
    let rotY = -16;

    bubbleSphere.parentElement.addEventListener("pointerdown", (event) => {
      dragging = true;
      startX = event.clientX;
      startY = event.clientY;
      bubbleSphere.parentElement.setPointerCapture(event.pointerId);
    });

    bubbleSphere.parentElement.addEventListener("pointermove", (event) => {
      if (!dragging) return;
      const dx = event.clientX - startX;
      const dy = event.clientY - startY;
      bubbleSphere.style.setProperty("--ry", `${rotY + dx * .18}deg`);
      bubbleSphere.style.setProperty("--rx", `${rotX - dy * .12}deg`);
    });

    bubbleSphere.parentElement.addEventListener("pointerup", (event) => {
      if (!dragging) return;
      dragging = false;
      const styles = getComputedStyle(bubbleSphere);
      rotX = parseFloat(styles.getPropertyValue("--rx")) || rotX;
      rotY = parseFloat(styles.getPropertyValue("--ry")) || rotY;
      bubbleSphere.parentElement.releasePointerCapture(event.pointerId);
    });

    feed.addEventListener("scroll", () => {
      returnButton.classList.toggle("is-visible", feed.scrollTop > window.innerHeight * .65);
    }, { passive: true });

    returnButton.addEventListener("click", () => {
      document.getElementById("menu").scrollIntoView({ behavior: "smooth" });
    });

    document.querySelectorAll(".story-carousel").forEach((carousel) => {
      const dots = carousel.parentElement.querySelectorAll(".slide-dots span");
      carousel.addEventListener("scroll", () => {
        const active = Math.round(carousel.scrollLeft / carousel.clientWidth);
        dots.forEach((dot, index) => dot.classList.toggle("is-active", index === active));
      }, { passive: true });
    });
  </script>
</body>
</html>
